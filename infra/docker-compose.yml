services:
  mysql:
    image: mysql:8.4
    container_name: flight-ticket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flight_demo
      MYSQL_USER: flight
      MYSQL_PASSWORD: flight123
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_BASE_URL: ${AMADEUS_BASE_URL:-https://test.api.amadeus.com}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - flight_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uflight", "-pflight123"]
      interval: 5s
      timeout: 3s
      retries: 20

  crawler:
    build:
      context: ../crawler
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: flight_demo
      MYSQL_USER: flight
      MYSQL_PASSWORD: flight123
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  flight_mysql_data:
