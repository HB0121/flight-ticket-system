server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flight_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: flight
    password: flight123
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: true
  jackson:
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
      schema-locations: file:../infra/mysql/init.sql

aerodatabox:
  host: ${AERODATABOX_HOST:aerodatabox.p.rapidapi.com}
  base-url: ${AERODATABOX_BASE_URL:https://aerodatabox.p.rapidapi.com}
  key: ${AERODATABOX_KEY:your-aerodatabox-key}

app:
  crawler:
    command: docker compose -f ../infra/docker-compose.yml run --rm crawler
    timeout-seconds: 120
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
