server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    relaxed-query-chars: '|,{,},[,]'

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flight_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: flight
    password: flight123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: never

app:
  crawler:
    command: docker compose -f ../infra/docker-compose.yml run --rm crawler
    timeout-seconds: 120
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
