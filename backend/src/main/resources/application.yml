server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:flight_demo;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jackson:
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-dev.sql

app:
  crawler:
    command: docker compose -f ../infra/docker-compose.yml run --rm crawler
    timeout-seconds: 120
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
